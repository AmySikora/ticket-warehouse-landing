<html lang="en">
<head>

  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>Ticket VeriGuard — Saved Tickets</title>

  <meta
    name="description"
    content="Review your saved ticket listings in one place."
  />

  <link rel="icon" href="./favicon_logo.png" type="image/png"/>
  <link rel="stylesheet" href="./styles-v2.css"/>
</head>

<body class="page-search">
  <header class="nav">
    <div class="nav--brand">
      <a href="index.html" class="logo-bay">
        <img src="./favicon_logo.png" alt="Ticket VeriGuard" class="logo-img">
      </a>

      <button class="nav-toggle" id="navToggle" aria-expanded="false" aria-label="Toggle navigation">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>

      <nav class="topnav" id="primary-nav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="search.html" class="nav-link">Search</a>
        <a href="saved.html" class="nav-link nav-active" aria-current="page">Saved</a>
        <a href="compare.html" class="nav-link">Compare</a>
        <a href="how-it-works.html" class="nav-link">How It Works</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="tvb-container">
        <div class="card" style="margin-top:16px;">
          <h1 class="grad-text">Saved tickets</h1>
          <p class="muted" style="margin-top:8px;">
            Review the listings you saved, grouped by event, with the same layout you already liked.
          </p>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="tvb-container">
        <div class="card">

          <h2>Your ticket options</h2>

          <div class="tti-compare-toolbar">
            <label class="tti-sort-wrap">
              <span class="muted">Events:</span>
              <select id="tti-event-sort" class="tti-sort-select">
                <option value="lowest-price">Lowest price</option>
                <option value="lowest-total">Lowest total</option>
                <option value="event-name">Event name</option>
                <option value="most-recent">Most recent</option>
              </select>
            </label>

            <label class="tti-sort-wrap">
              <span class="muted">Listings:</span>
              <select id="tti-sort" class="tti-sort-select">
                <option value="price-asc">Lowest price</option>
                <option value="allin-asc">Lowest total</option>
                <option value="newest">Newest</option>
                <option value="marketplace">Marketplace</option>
              </select>
            </label>

            <div class="tti-toolbar-actions">
              <button type="button" class="btn btn-ghost" id="tti-expand-all">Expand all</button>
              <button type="button" class="btn btn-ghost" id="tti-collapse-all">Collapse all</button>
              <button type="button" class="btn btn-ghost" id="tti-clear-session">Clear all</button>
            </div>
          </div>

          <div class="tti-table-wrap">
            <div id="tti-snapshots-body" class="tti-snapshots-list">
              <div class="muted">No saved tickets yet.</div>
            </div>
          </div>

          <p id="tti-status" class="muted" style="margin-top:14px;"></p>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container footer-bar">
      <div class="muted">© <span id="y"></span> Ticket VeriGuard</div>
    </div>
  </footer>

  <script src="./js/main.js" defer></script>
</body>
</html>
